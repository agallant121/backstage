inherit_from:
  - .rubocop_todo.yml

plugins:
  - rubocop-rails
  - rubocop-performance
  - rubocop-rspec

AllCops:
  NewCops: enable
  TargetRubyVersion: 3.3
  SuggestExtensions: false
  Exclude:
    - "bin/*"
    - "db/schema.rb"
    - "db/structure.sql"
    - "node_modules/**/*"
    - "vendor/**/*"
    - "tmp/**/*"
    - "db/queue_schema.rb"
    - "db/migrate/**/*"


Rails:
  Enabled: true

RSpec:
  Enabled: true

Layout/LineLength:
  Max: 120

Style/Documentation:
  Enabled: false
